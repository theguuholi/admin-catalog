apiVersion: apps/v1 
kind: Deployment
metadata:
  name: javaserver
  labels:
    app: javaserver
    key: javaserver
spec:
  replicas: 2
  selector:
    matchLabels:
      key: javaserver
  template:
    metadata:
      labels:
        key: javaserver
    spec:
      containers:
        - name: javaserver
          image: "guuhworship/javagus:latest"
