apiVersion: apps/v1 
kind: Deployment
metadata:
  name: gusapp
  labels:
    app: gusapp
    key: gusapp
spec:
  replicas: 1
  selector:
    matchLabels:
      key: gusapp
  template:
    metadata:
      labels:
        key: gusapp
    spec:
      containers:
        - name: gusapp
          image: "guuhworship/javagus:v1"
          env:
            - name: NAME
              value: "Gustavo"
            - name: AGE
              value: "32"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
