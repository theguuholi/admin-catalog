apiVersion: apps/v1 
kind: Deployment
metadata:
  name: gusapp
  labels:
    app: gusapp
    key: gusapp
spec:
  replicas: 2
  selector:
    matchLabels:
      key: gusapp
  template:
    metadata:
      labels:
        key: gusapp
    spec:
      containers:
        - name: gusapp
          image: "guuhworship/javagus:latest"
